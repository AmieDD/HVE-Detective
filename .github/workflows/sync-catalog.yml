name: Sync HVE-Core Catalog

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [hve-core-release]

permissions:
  contents: write
  pull-requests: write
  attestations: read
  id-token: write

concurrency:
  group: sync-catalog
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest hve-core release
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Pick the highest-versioned non-draft release regardless of the
          # prerelease flag. Upstream's active 3.3.x line is published with
          # prerelease=true, and the only recent prerelease=false tag (3.2.2)
          # ships empty-stub VSIXes for several collections.
          releases=$(gh api repos/microsoft/hve-core/releases --paginate)
          rel=$(jq -c '
            [ .[]
              | select(.draft == false)
              | select(.tag_name | test("^hve-core-v[0-9]+\\.[0-9]+\\.[0-9]+$"))
            ]
            | sort_by(
                (.tag_name | capture("^hve-core-v(?<maj>[0-9]+)\\.(?<min>[0-9]+)\\.(?<pat>[0-9]+)$"))
                | [(.maj | tonumber), (.min | tonumber), (.pat | tonumber)]
              )
            | last
          ' <<<"$releases")
          if [ -z "$rel" ] || [ "$rel" = "null" ]; then
            echo "No hve-core release found" >&2
            exit 1
          fi
          tag=$(jq -r '.tag_name' <<<"$rel")
          version=${tag#hve-core-v}

          # Allow-list of per-package VSIXes (one per upstream chip; skip
          # hve-core-all because it duplicates content, and hve-installer
          # because it has no upstream chip).
          pkgs=(hve-core hve-coding-standards hve-data-science hve-design-thinking \
                hve-experimental hve-github hve-gitlab hve-ado hve-jira \
                hve-project-planning hve-rai-planning hve-security)

          : > assets.txt
          for p in "${pkgs[@]}"; do
            name="${p}-${version}.vsix"
            url=$(jq -r --arg n "$name" '.assets[] | select(.name == $n) | .url' <<<"$rel")
            if [ -z "$url" ] || [ "$url" = "null" ]; then
              echo "::warning::Asset $name not present on $tag; skipping"
              continue
            fi
            printf '%s\t%s\n' "$name" "$url" >> assets.txt
          done

          if ! [ -s assets.txt ]; then
            echo "No per-package assets resolved on $tag" >&2
            exit 1
          fi

          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          {
            echo 'asset_list<<EOF'
            cut -f1 assets.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $tag with $(wc -l < assets.txt) per-package asset(s)"

      - name: Download, verify, and merge VSIX packages
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p vendor vendor/merged
          while IFS=$'\t' read -r name url; do
            echo "::group::$name"
            curl -sSL --fail \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o "vendor/${name}" "$url"
            gh attestation verify "vendor/${name}" -R microsoft/hve-core
            unzip -q -o "vendor/${name}" -d vendor/merged
            echo "::endgroup::"
          done < assets.txt

          if [ -d vendor/merged/extension/.github ]; then
            pkg_root=vendor/merged/extension
          elif [ -d vendor/merged/.github ]; then
            echo "::warning::Merged VSIX layout missing 'extension/' prefix; falling back to vendor/merged" >&2
            pkg_root=vendor/merged
          else
            echo "Unexpected merged layout: neither vendor/merged/extension/.github nor vendor/merged/.github exists" >&2
            exit 1
          fi
          echo "pkg_root=$pkg_root" >> "$GITHUB_OUTPUT"
          echo "Using package root: $pkg_root"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate catalog
        env:
          PKG_ROOT: ${{ steps.merge.outputs.pkg_root }}
        run: node scripts/generate-catalog.mjs "$PKG_ROOT"

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-hve-core
          delete-branch: true
          add-paths: src/data/catalog.json
          commit-message: 'chore: sync catalog from hve-core ${{ steps.resolve.outputs.tag }}'
          title: 'chore: sync catalog from hve-core ${{ steps.resolve.outputs.tag }}'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          body: |
            Automated catalog regeneration from verified hve-core VSIX packages.

            - Tag: `${{ steps.resolve.outputs.tag }}`
            - Packages merged:
              ```
              ${{ steps.resolve.outputs.asset_list }}
              ```

            Each VSIX verified with `gh attestation verify -R microsoft/hve-core` before extraction.
